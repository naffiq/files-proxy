server {
    listen 80;
    server_name files-mis.emdey.kz;

    location / {
        proxy_pass https://prod-service-results.object.pscloud.io;
        proxy_ssl_server_name on;
        proxy_set_header Host prod-service-results.object.pscloud.io;

        # CORS
        add_header Access-Control-Allow-Origin "https://mis.emdey.kz" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }
}
