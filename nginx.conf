server {
    listen 80;
    server_name files.emdey.kz;

    location ~ ^/object/(?<bucket>[^/]+)/(?<filepath>.+)$ {
        proxy_pass https://$bucket.object.pscloud.io/$filepath$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host $bucket.object.pscloud.io;

        # CORS
        add_header Access-Control-Allow-Origin "https://mis.emdey.kz" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    location ~ ^/archive/(?<bucket>[^/]+)/(?<filepath>.+)$ {
        proxy_pass https://$bucket.archive.pscloud.io/$filepath$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host $bucket.archive.pscloud.io;

        # CORS
        add_header Access-Control-Allow-Origin "https://mis.emdey.kz" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }
}
